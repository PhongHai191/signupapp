version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: appdb
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    image: 529646246979.dkr.ecr.ap-southeast-2.amazonaws.com/new-repository
    container_name: backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: appdb

volumes:
  mysql_data:
